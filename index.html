<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CySA+ Trainer</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f172a">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="container">
  <div class="card">
    <h1>CySA+ Trainer</h1>
    <p class="sub">Mobile-friendly CySA+ practice trainer with smaller packs, PBQs, confidence tracking, flags, analytics, and detailed explanations.</p>
    <div class="toolbar">
      <label for="packSelect">Question Pack</label>
      <select id="packSelect"></select>
      <button onclick="loadSelectedPack()">Load Pack</button>
      <button class="secondary" onclick="shuffleQuiz()">Shuffle</button>
      <button class="secondary" onclick="restart()">Restart</button>
    </div>
    <div><span class="badge" id="progress"></span><span class="badge" id="score"></span><span class="badge" id="meta"></span></div>
    <div class="question" id="question">Loading...</div>
    <div id="options"></div>
    <div class="confidence" id="confidenceBox">
      <strong>Confidence:</strong><br>
      <label><input type="radio" name="confidence" value="guess"> Guess</label>
      <label><input type="radio" name="confidence" value="50"> 50/50</label>
      <label><input type="radio" name="confidence" value="sure"> Pretty sure</label>
      <label><input type="radio" name="confidence" value="certain"> Certain</label>
    </div>
    <div id="explanation"></div>
    <div class="controls">
      <button id="submitBtn" onclick="submitAnswer()">Submit Answer</button>
      <button id="nextBtn" onclick="nextQuestion()" style="display:none;">Next Question</button>
      <button class="secondary flag" onclick="toggleFlag()">Flag for Review</button>
    </div>
    <div id="finalAnalytics"></div>
  </div>
</div>
<script src="js/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js'));
}
</script>
</body>
</html>
