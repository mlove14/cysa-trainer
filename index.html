<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CySA+ Coach Foundation</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icons/favicon.png">
<meta name="theme-color" content="#0f172a">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-shell">
  <header class="hero">
    <div class="brand-row">
      <img src="icons/icon-192.png" alt="CySA+ Coach logo" class="logo">
      <div>
        <p class="eyebrow">Foundation Release</p>
        <h1>CySA+ Coach</h1>
        <p class="sub">Your personalized CS0-003 trainer for CompTIA-style reasoning, PBQs, and weak-area practice.</p>
      </div>
    </div>
    <div class="readiness-card">
      <span class="small">Readiness</span>
      <strong id="readinessScore">0%</strong>
      <span id="readinessLabel">Start practicing</span>
    </div>
  </header>

  <section class="dashboard grid">
    <div class="metric"><strong>Total Answered</strong><br><span id="dashAnswered">0</span></div>
    <div class="metric"><strong>Overall Accuracy</strong><br><span id="dashAccuracy">0%</span></div>
    <div class="metric"><strong>Low/No Confidence</strong><br><span id="dashLowConf">0</span></div>
    <div class="metric"><strong>Recommended Focus</strong><br><span id="dashFocus">Start Pack 1</span></div>
  </section>

  <main class="card">
    <div class="toolbar">
      <label for="packSelect">Question Pack</label>
      <select id="packSelect"></select>
      <button onclick="loadSelectedPack()">Load Pack</button>
      <button class="secondary" onclick="shuffleQuiz()">Shuffle</button>
      <button class="secondary" onclick="restart()">Restart Pack</button>
      <button class="danger" onclick="resetProgress()">Reset Progress</button>
    </div>

    <div><span class="badge" id="progress"></span><span class="badge" id="score"></span><span class="badge" id="meta"></span></div>
    <div class="question" id="question">Loading...</div>
    <div id="options"></div>

    <div class="confidence" id="confidenceBox">
      <strong>Confidence:</strong><br>
      <label><input type="radio" name="confidence" value="guess"> Guess</label>
      <label><input type="radio" name="confidence" value="50"> 50/50</label>
      <label><input type="radio" name="confidence" value="sure"> Pretty sure</label>
      <label><input type="radio" name="confidence" value="certain"> Certain</label>
    </div>

    <div id="explanation"></div>
    <div class="controls">
      <button id="submitBtn" onclick="submitAnswer()">Submit Answer</button>
      <button id="nextBtn" onclick="nextQuestion()" style="display:none;">Next Question</button>
      <button class="secondary flag" onclick="toggleFlag()">Flag for Review</button>
    </div>
    <div id="finalAnalytics"></div>
  </main>
</div>
<script src="js/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js'));
}
</script>
</body>
</html>
